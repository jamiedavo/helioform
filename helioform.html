<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunflower Generator Pro</title>
  <style>
    :root {
      --panel-w: 340px;
      --mobile-preview-h: 48vh;
      --line: #222;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    .preview-panel {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #controls {
      width: var(--panel-w);
      height: 100vh;
      padding: 20px;
      background: #111;
      border-right: 1px solid #333;
      overflow-y: auto;
      overflow-x: hidden;
      flex: 0 0 var(--panel-w);
      -webkit-overflow-scrolling: touch;
    }

    .mobile-preview-actions {
      display: none;
    }

    .preview-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    .sub {
      font-size: 13px;
      color: #bbb;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .group {
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .group:last-child {
      border-bottom: none;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #ddd;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    input[type="range"],
    select,
    button {
      width: 100%;
    }

    input[type="range"] {
      min-height: 32px;
      touch-action: pan-y;
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 13px;
    }

    .value {
      color: #aaa;
      font-size: 12px;
      margin-left: 6px;
    }

    select,
    button,
    input[type="number"] {
      background: #1a1a1a;
      color: white;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 6px;
      min-height: 44px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      background: #202020;
    }

    button:hover {
      background: #2a2a2a;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    canvas {
      display: block;
      width: calc(100vw - var(--panel-w));
      height: 100vh;
      flex: 0 0 calc(100vw - var(--panel-w));
      background: #000;
    }

    .tiny {
      font-size: 11px;
      color: #888;
      line-height: 1.4;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      body {
        display: block;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .preview-panel {
        position: sticky;
        top: 0;
        z-index: 30;
        display: block;
        padding: 10px 12px 10px;
        background: rgba(0, 0, 0, 0.96);
        border-bottom: 1px solid #1f1f1f;
        transition: padding 0.2s ease;
      }

      .preview-stage {
        width: 100%;
        height: auto;
        padding: 0;
      }

      canvas {
        display: block;
        width: min(100%, 560px);
        height: auto;
        aspect-ratio: 1 / 1;
        max-height: none;
        min-height: 0;
        flex: none;
        margin: 0 auto;
        transition: width 0.22s ease, max-width 0.22s ease, transform 0.22s ease;
      }

      body.scrolled-mobile .preview-panel {
        padding: 8px 12px 8px;
      }

      body.scrolled-mobile canvas {
        width: min(100%, 320px);
      }

      #controls {
        width: 100%;
        height: auto;
        min-height: 0;
        max-height: none;
        border-right: none;
        border-top: none;
        padding: 16px 12px 28px;
        overflow: visible;
        flex: none;
      }

      .mobile-preview-actions {
        display: block;
        position: static;
        z-index: auto;
        width: min(100%, 560px);
        margin: 12px auto 0;
        padding: 0;
        background: transparent;
        border-bottom: none;
        transition: width 0.22s ease, margin 0.22s ease;
      }

      body.scrolled-mobile .mobile-preview-actions {
        width: min(100%, 320px);
        margin-top: 8px;
      }

      .mobile-preview-actions .row {
        gap: 10px;
      }

      .mobile-preview-actions button {
        min-height: 42px;
        font-size: 15px;
      }

      #controls {
        touch-action: pan-y;
      }

      label {
        margin-top: 14px;
      }

      input[type="range"] {
        margin-top: 6px;
        margin-bottom: 12px;
        min-height: 36px;
        touch-action: pan-y;
      }

      body.is-scrolling-slider input[type="range"] {
        pointer-events: none;
      }

      .preset-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        overflow: visible;
        gap: 10px;
        padding-bottom: 0;
      }

      .group {
        margin-bottom: 14px;
        padding-bottom: 0;
        border-bottom: none;
        background: #111;
        border: 1px solid #242424;
        border-radius: 12px;
        padding: 14px;
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <div class="preview-panel">
    <div class="preview-stage">
      <canvas id="canvas"></canvas>
    </div>

    <div class="mobile-preview-actions">
      <div class="row">
        <button type="button" id="downloadPngTop">Download PNG</button>
      </div>
    </div>
  </div>

  <div id="controls">
    <h1>Sunflower Generator Pro</h1>
    <div class="sub">
      Phyllotaxis-based radial pattern generator for high-end print design.
    </div>

    <div class="group">
      <h3>Presets & Exploration</h3>
      <div class="preset-grid">
        <button type="button" id="randomizeBtn" style="grid-column: span 2; background: #3d3d3d; border-color: #555;">🎲 Randomize Design</button>
        <button type="button" data-preset="sunflower">Sunflower</button>
        <button type="button" data-preset="dense">Dense Core</button>
        <button type="button" data-preset="minimal">Minimal</button>
        <button type="button" data-preset="study">Golden Study</button>
        <button type="button" data-preset="amber">Burnt Amber</button>
        <button type="button" data-preset="mono">Monochrome</button>
      </div>
    </div>

    <div class="group">
        <h3>Structure</h3>
  
        <label>
          Points
          <span class="value" id="pointsVal">1800</span>
        </label>
        <input type="range" id="points" min="100" max="8000" step="50" value="1800" />
  
        <label>
          Angle (°)
          <span class="value" id="angleVal">137.5</span>
        </label>
        <input type="range" id="angle" min="130" max="145" step="0.1" value="137.5" />
  
        <label class="checkbox">
          <input type="checkbox" id="lockGolden" checked />
          Lock true golden angle
        </label>
  
        <label>
          Framing
          <span class="value" id="framingVal">0.78</span>
        </label>
        <input type="range" id="framing" min="0.55" max="0.95" step="0.01" value="0.78" />
  
        <label>
          Radius Curve
          <span class="value" id="radiusPowerVal">0.50</span>
        </label>
        <input type="range" id="radiusPower" min="0.35" max="0.75" step="0.01" value="0.50" />
      </div>

    <div class="group">
      <h3>Export</h3>

      <label>
        PNG Size
      </label>
      <select id="exportSize">
        <option value="screen">Screen size</option>
        <option value="2000">2000 px</option>
        <option value="3000">3000 px</option>
        <option value="4000" selected>4000 px</option>
        <option value="6000">6000 px</option>
      </select>

      <div class="row" style="margin-top: 12px;">
        <button type="button" id="downloadPng">Download PNG</button>
        <button type="button" id="downloadSvg">Export SVG (Vector)</button>
      </div>
      <div class="tiny">Use SVG for high-resolution printing or plotter cutting.</div>
    </div>
  </div>

  <script>
    const GOLDEN_ANGLE = 137.50776405003785;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const previewPanel = document.querySelector(".preview-panel");

    const controls = {
      points: document.getElementById("points"),
      angle: document.getElementById("angle"),
      lockGolden: document.getElementById("lockGolden"),
      framing: document.getElementById("framing"),
      radiusPower: document.getElementById("radiusPower"),
      seedProfile: document.getElementById("seedProfile"),
      size: document.getElementById("size"),
      sizeCurve: document.getElementById("sizeCurve"),
      shape: document.getElementById("shape"),
      stretch: document.getElementById("stretch"),
      showPetals: document.getElementById("showPetals"),
      petalType: document.getElementById("petalType"),
      petalCount: document.getElementById("petalCount"),
      petalLength: document.getElementById("petalLength"),
      petalWidth: document.getElementById("petalWidth"),
      petalOffset: document.getElementById("petalOffset"),
      petalOpacity: document.getElementById("petalOpacity"),
      showBackPetals: document.getElementById("showBackPetals"),
      backPetalLength: document.getElementById("backPetalLength"),
      backPetalWidth: document.getElementById("backPetalWidth"),
      backPetalOffset: document.getElementById("backPetalOffset"),
      backPetalOpacity: document.getElementById("backPetalOpacity"),
      backPetalRotation: document.getElementById("backPetalRotation"),
      palette: document.getElementById("palette"),
      background: document.getElementById("background"),
      contrast: document.getElementById("contrast"),
      exportSize: document.getElementById("exportSize"),
    };

    // ... [Other helper functions: hexToRgb, mix, clamp, lerpColor, getPaletteStops, etc. from your script] ...

    function randomizeBloom() {
      // Structure
      controls.points.value = Math.floor(Math.random() * (3500 - 800) + 800);
      controls.framing.value = (Math.random() * (0.85 - 0.65) + 0.65).toFixed(2);
      
      // Seeds
      const profiles = ["natural", "even", "denseCore", "outerFlare"];
      controls.seedProfile.value = profiles[Math.floor(Math.random() * profiles.length)];
      applySeedProfile(controls.seedProfile.value);
      
      controls.size.value = (Math.random() * (4.5 - 1.8) + 1.8).toFixed(1);
      controls.stretch.value = (Math.random() * (1.8 - 1) + 1).toFixed(2);
      
      // Petals
      const hasPetals = Math.random() > 0.35;
      controls.showPetals.checked = hasPetals;
      controls.showBackPetals.checked = hasPetals && Math.random() > 0.5;
      
      if (hasPetals) {
        controls.petalCount.value = Math.floor(Math.random() * (42 - 18) + 18);
        controls.petalLength.value = Math.floor(Math.random() * (130 - 50) + 50);
      }

      // Palette
      const palettes = ["sunflower", "amber", "copper", "bone"];
      controls.palette.value = palettes[Math.floor(Math.random() * palettes.length)];

      drawPreview();
    }

    // Attach Randomizer & SVG Export
    document.getElementById("randomizeBtn").addEventListener("click", randomizeBloom);
    document.getElementById("downloadSvg").addEventListener("click", exportSVG);

    // ... [Rest of your rendering and UI logic: drawPreview, exportSVG, resizeCanvas, etc.] ...
    
    // Ensure all logic from the original file is preserved.
    applyPreset("sunflower");
    resizeCanvas();
  </script>
</body>
</html>
